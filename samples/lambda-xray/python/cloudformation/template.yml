AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda X-Ray Tracing Sample

Parameters:
  Suffix:
    Type: String
    Description: Unique suffix for resource names

Resources:
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "xray-demo-role-${Suffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - arn:aws:iam::aws:policy/AWSLambda_ReadOnlyAccess

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "xray-demo-${Suffix}"
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Code:
        ZipFile: |
          import os
          import json
          import logging
          import boto3

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          lambda_client = boto3.client("lambda")

          def lambda_handler(event, context):
              logger.info(f"Event: {json.dumps(event)}")
              logger.info(f"Request ID: {context.aws_request_id}")

              response = lambda_client.get_account_settings()

              return {
                  "statusCode": 200,
                  "body": json.dumps({
                      "message": "X-Ray tracing demo",
                      "accountUsage": response.get("AccountUsage", {}),
                      "requestId": context.aws_request_id
                  })
              }

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn

  RoleName:
    Description: IAM role name
    Value: !Ref LambdaRole

  RoleArn:
    Description: IAM role ARN
    Value: !GetAtt LambdaRole.Arn
