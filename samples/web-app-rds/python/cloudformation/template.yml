AWSTemplateFormatVersion: '2010-09-09'
Description: Web App RDS Sample

Parameters:
  FunctionName:
    Type: String
    Default: webapp-rds-cfn
    Description: Name of the Lambda function
  DBInstanceId:
    Type: String
    Default: webapp-postgres-cfn
    Description: RDS instance identifier
  DBName:
    Type: String
    Default: appdb
    Description: Database name
  DBUser:
    Type: String
    Default: admin
    Description: Database username
  DBPassword:
    Type: String
    Default: localstack123
    NoEcho: true
    Description: Database password

Resources:
  # IAM Role for Lambda
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${FunctionName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # VPC for RDS
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${FunctionName}-vpc'

  # Private Subnet A
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Sub '${AWS::Region}a'
      Tags:
        - Key: Name
          Value: !Sub '${FunctionName}-private-a'

  # Private Subnet B
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Sub '${AWS::Region}b'
      Tags:
        - Key: Name
          Value: !Sub '${FunctionName}-private-b'

  # DB Subnet Group
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Name
          Value: !Sub '${FunctionName}-subnet-group'

  # RDS PostgreSQL Instance
  PostgresInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Ref DBInstanceId
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '13.4'
      MasterUsername: !Ref DBUser
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref DBName
      AllocatedStorage: 20
      DBSubnetGroupName: !Ref DBSubnetGroup

  # Lambda Function
  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: PostgresInstance
    Properties:
      FunctionName: !Ref FunctionName
      Runtime: python3.12
      Handler: app.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          DB_HOST: !GetAtt PostgresInstance.Endpoint.Address
          DB_PORT: !GetAtt PostgresInstance.Endpoint.Port
          DB_NAME: !Ref DBName
          DB_USER: !Ref DBUser
          DB_PASSWORD: !Ref DBPassword
      Code:
        ZipFile: |
          import json
          import logging
          import os
          from datetime import datetime

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          DB_HOST = os.environ.get("DB_HOST", "localhost")
          DB_PORT = os.environ.get("DB_PORT", "5432")
          DB_NAME = os.environ.get("DB_NAME", "appdb")
          DB_USER = os.environ.get("DB_USER", "admin")
          DB_PASSWORD = os.environ.get("DB_PASSWORD", "password")

          ITEMS = {}

          def handler(event, context):
              logger.info("Received event: %s", json.dumps(event))
              http_method = event.get("httpMethod", "GET")
              path = event.get("path", "/")
              path_params = event.get("pathParameters") or {}
              body = event.get("body")

              if body and isinstance(body, str):
                  try:
                      body = json.loads(body)
                  except json.JSONDecodeError:
                      pass

              try:
                  if path == "/items" and http_method == "GET":
                      return response(200, {"items": list(ITEMS.values())})
                  elif path == "/items" and http_method == "POST":
                      item_id = body.get("id") if body else f"item-{datetime.utcnow().strftime('%Y%m%d%H%M%S%f')}"
                      item = {"id": item_id, "name": body.get("name", ""), "description": body.get("description", ""),
                              "category": body.get("category", "general"), "price": body.get("price", 0),
                              "created_at": datetime.utcnow().isoformat(), "updated_at": datetime.utcnow().isoformat()}
                      ITEMS[item_id] = item
                      return response(201, item)
                  elif path.startswith("/items/") and http_method == "GET":
                      item_id = path_params.get("id") or path.split("/")[-1]
                      item = ITEMS.get(item_id)
                      if not item:
                          return response(404, {"error": f"Item {item_id} not found"})
                      return response(200, item)
                  elif path.startswith("/items/") and http_method == "PUT":
                      item_id = path_params.get("id") or path.split("/")[-1]
                      if item_id not in ITEMS:
                          return response(404, {"error": f"Item {item_id} not found"})
                      item = ITEMS[item_id]
                      for field in ["name", "description", "category", "price"]:
                          if body and field in body:
                              item[field] = body[field]
                      item["updated_at"] = datetime.utcnow().isoformat()
                      return response(200, item)
                  elif path.startswith("/items/") and http_method == "DELETE":
                      item_id = path_params.get("id") or path.split("/")[-1]
                      if item_id not in ITEMS:
                          return response(404, {"error": f"Item {item_id} not found"})
                      del ITEMS[item_id]
                      return response(204, None)
                  elif path == "/health":
                      return response(200, {"status": "healthy", "database": "simulated", "timestamp": datetime.utcnow().isoformat()})
                  else:
                      return response(404, {"error": "Not found"})
              except Exception as e:
                  logger.error("Error: %s", e)
                  return response(500, {"error": str(e)})

          def response(status_code, body):
              resp = {"statusCode": status_code, "headers": {"Content-Type": "application/json", "Access-Control-Allow-Origin": "*"}}
              if body is not None:
                  resp["body"] = json.dumps(body)
              return resp

  # Lambda Function URL
  LambdaFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !GetAtt LambdaFunction.Arn

  # Permission for public access
  LambdaFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

Outputs:
  FunctionName:
    Description: Lambda function name
    Value: !Ref LambdaFunction

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt LambdaFunction.Arn

  FunctionUrl:
    Description: Lambda Function URL endpoint
    Value: !GetAtt LambdaFunctionUrl.FunctionUrl

  DBInstanceId:
    Description: RDS instance identifier
    Value: !Ref PostgresInstance

  DBHost:
    Description: RDS endpoint address
    Value: !GetAtt PostgresInstance.Endpoint.Address

  DBPort:
    Description: RDS endpoint port
    Value: !GetAtt PostgresInstance.Endpoint.Port
